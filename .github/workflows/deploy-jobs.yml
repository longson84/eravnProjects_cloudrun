name: Deploy Cloud Run Job

# ─── KHI NÀO CHẠY? ───
# Chỉ khi push lên branch cloud-run-jobs
# và có thay đổi trong eravn-backend/ hoặc workflow file này
on:
  push:
    branches:
      - cloud-run-jobs
    paths:
      - 'eravn-backend/**'
      - '.github/workflows/deploy-jobs.yml'

# ─── BIẾN DÙNG CHUNG ───
env:
  REGION: asia-southeast1
  JOB_NAME: eravnprojects-sync-job
  # Image name KHÁC với Service (sync-job thay vì eravn-backend)
  IMAGE: asia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloud-run-source-deploy/sync-job

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # Quyền cần cho WIF (giống Service)
    permissions:
      contents: read
      id-token: write

    steps:
      # ── Bước 1: Checkout code ──
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Bước 2: Xác thực GCP qua WIF (giống Service) ──
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      # ── Bước 3: Setup gcloud CLI ──
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      # ── Bước 4: Configure Docker cho Artifact Registry ──
      - name: Configure Docker
        run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet

      # ── Bước 5: Build Docker image (dùng Dockerfile.jobs!) ──
      - name: Build Docker image
        run: |
          docker build \
            -f eravn-backend/Dockerfile.jobs \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            eravn-backend/

      # ── Bước 6: Push image lên Artifact Registry ──
      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      # ── Bước 7: Deploy Cloud Run Job (Option B - Pure CLI) ──
      # create nếu job chưa tồn tại, update nếu đã có
      - name: Deploy Job
        env:
          ENV_VARS: "GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},GCP_DATABASE_ID=eravnprojectscloudrun,SYNC_CUTOFF_SECONDS=3600,GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }},GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }},GOOGLE_REFRESH_TOKEN=${{ secrets.GOOGLE_REFRESH_TOKEN }}"
        run: |
          gcloud run jobs update ${{ env.JOB_NAME }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --service-account eravn-backend-sa@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars "$ENV_VARS" \
            --task-timeout=7200s \
            --max-retries=1 \
            --cpu=1 \
            --memory=1Gi

      # ── Bước 8: Log kết quả ──
      - name: Show Job Info
        run: |
          echo "✅ Job deployed: ${{ env.JOB_NAME }}"
          echo ""
          echo "🔗 Chạy thử thủ công:"
          echo "   gcloud run jobs execute ${{ env.JOB_NAME }} --region ${{ env.REGION }}"
          echo ""
          echo "📋 Xem logs:"
          echo "   gcloud logging read 'resource.type=\"cloud_run_job\" AND resource.labels.job_name=\"${{ env.JOB_NAME }}\"' --limit=50"
